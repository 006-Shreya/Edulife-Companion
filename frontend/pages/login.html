<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Login - EduLife Companion</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/styles/theme.css">
    <link rel="stylesheet" href="/styles/auth.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="auth-container">
        <h2>Login to EduLife</h2>
        <div id="alert-container"></div>
        <form id="login-form">
            <div class="mb-3">
                <input type="email" id="email" class="form-control" placeholder="Email" required>
            </div>
            <div class="mb-3">
                <input type="password" id="password" class="form-control" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-custom w-100" id="submit-btn">Login</button>
        </form>
        <p class="mt-3">Don't have an account? <a href="signup.html" class="text-warning">Sign Up</a></p>
    </div>

    <script src="/scripts/config/api.js"></script>
    <script src="/scripts/utils/auth.js"></script>
    <script src="/scripts/utils/alerts.js"></script>
    <script src="/scripts/pages/login.js"></script>
</body>
</html>
