<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Signup - EduLife Companion</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/styles/theme.css">
    <link rel="stylesheet" href="/styles/auth.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="auth-container">
        <h2>Sign Up for EduLife</h2>
        <div id="alert-container"></div>
        <form id="signup-form">
            <div class="mb-3">
                <input type="text" name="fullName" class="form-control" placeholder="Full Name" required>
            </div>
            <div class="mb-3">
                <input type="email" name="email" class="form-control" placeholder="Email" required>
            </div>
            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-custom w-100" id="submit-btn">Sign Up</button>
        </form>
        <p class="mt-3">Already have an account? <a href="login.html" class="text-warning">Login</a></p>
    </div>

    <script src="/scripts/config/api.js"></script>
    <script src="/scripts/utils/auth.js"></script>
    <script src="/scripts/utils/alerts.js"></script>
    <script src="/scripts/pages/signup.js"></script>
</body>
</html>
